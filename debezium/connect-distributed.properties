# Kafka Connect Distributed Configuration for Debezium CDC
# Optimized for MySQL to ClickHouse sync pipeline

# Kafka broker connection
bootstrap.servers=localhost:9092

# Group ID for this Connect cluster
group.id=debezium-mysql-connector-group

# Topics for storing connector and task configurations
config.storage.topic=debezium-configs
config.storage.replication.factor=1
config.storage.partitions=1

# Topics for storing offsets
offset.storage.topic=debezium-offsets
offset.storage.replication.factor=1
offset.storage.partitions=25

# Topic for storing status
status.storage.topic=debezium-status
status.storage.replication.factor=1
status.storage.partitions=5

# Flush much faster than normal, which is useful for testing/development
offset.flush.interval.ms=10000

# Connector plugin path
plugin.path=/Users/saurabhagrawal/Desktop/samples/rds-ch-sync/debezium

# Conversion settings
key.converter=org.apache.kafka.connect.json.JsonConverter
value.converter=org.apache.kafka.connect.json.JsonConverter
key.converter.schemas.enable=true
value.converter.schemas.enable=true

# Internal key and value converters (for internal topics)
internal.key.converter=org.apache.kafka.connect.json.JsonConverter
internal.value.converter=org.apache.kafka.connect.json.JsonConverter
internal.key.converter.schemas.enable=false
internal.value.converter.schemas.enable=false

# REST API settings
rest.host.name=localhost
rest.port=8083
rest.advertised.host.name=localhost
rest.advertised.port=8083

# Worker timeout settings
task.shutdown.graceful.timeout.ms=10000
offset.flush.timeout.ms=5000

# Enable handling of DELETE operations
transforms=unwrap
transforms.unwrap.type=io.debezium.transforms.ExtractNewRecordState
transforms.unwrap.drop.tombstones=false
transforms.unwrap.delete.handling.mode=rewrite
transforms.unwrap.add.fields=op,source.ts_ms,source.db,source.table

# Security settings (none for local development)
security.protocol=PLAINTEXT