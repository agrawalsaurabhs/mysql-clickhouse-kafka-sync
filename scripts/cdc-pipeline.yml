# CDC Pipeline — iTerm2 Layout
# Usage: itermocil --layout scripts/cdc-pipeline.yml

windows:
  - name: cdc-pipeline
    root: /Users/ubuntu/Browserstack/mysql-clickhouse-kafka-sync
    layout: tiled
    panes:
      - name: ClickHouse Logs
        commands:
          - clear
          - until [ -f clickhouse-setup/server.log ]; do sleep 1; done; tail -f clickhouse-setup/server.log

      - name: Kafka Logs
        commands:
          - clear
          - until [ -f kafka-setup/kafka.log ]; do sleep 1; done; tail -f kafka-setup/kafka.log

      - name: MySQL Error Log
        commands:
          - clear
          - tail -f $(brew --prefix)/var/mysql/*.err

      - name: Debezium Logs
        commands:
          - clear
          - until [ -f debezium-setup/debezium.log ]; do sleep 1; done; tail -f debezium-setup/debezium.log

      - name: Sinker Logs
        commands:
          - clear
          - until [ -f sinker-setup/sink.log ]; do sleep 1; done; tail -f sinker-setup/sink.log

      - name: Data Generator
        commands:
          - clear
          - echo "=== Data Generator ==="
          - echo "Press Enter to start continuous CRUD operations (every 5s)..."
          - read
          - ./mysql-setup/generate-data.sh

      - name: MySQL Client
        commands:
          - clear
          - P=$(grep -E '^MYSQL_ROOT_PASSWORD=' .env 2>/dev/null | cut -d= -f2-) && mysql -u root ${P:+-p"$P"} inventory

      - name: ClickHouse Client
        commands:
          - clear
          - ./clickhouse-setup/clickhouse client --database cdc_sync
