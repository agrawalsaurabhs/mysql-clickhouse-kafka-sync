# Kafka Server Configuration for MySQL-ClickHouse CDC Pipeline
# Based on Kafka 3.7.0

# Broker ID
broker.id=1
node.id=1

# Network settings
listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://localhost:9093
advertised.listeners=PLAINTEXT://localhost:9092
controller.quorum.voters=1@localhost:9093

# KRaft mode settings (no Zookeeper)
process.roles=broker,controller
controller.listener.names=CONTROLLER
inter.broker.listener.name=PLAINTEXT

# Log directories
log.dirs=/Users/saurabhagrawal/Desktop/samples/rds-ch-sync/kafka-data/kafka-logs

# Number of partitions per topic (good for CDC)
num.partitions=3

# Replication factor for internal topics
default.replication.factor=1
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1

# Log retention settings (keep CDC data for debugging)
log.retention.hours=168
log.retention.bytes=1073741824
log.segment.bytes=1073741824

# Log cleanup policy (keep all data for CDC)
log.cleanup.policy=delete

# Socket settings
socket.send.buffer.bytes=102400
socket.receive.buffer.bytes=102400
socket.request.max.bytes=104857600

# Group coordinator settings
group.initial.rebalance.delay.ms=0

# Enable auto topic creation
auto.create.topics.enable=true

# Compression settings
compression.type=producer

# Enable idempotence for exactly-once semantics
enable.idempotence=true

# Transaction settings for Kafka Connect
transaction.max.timeout.ms=3600000

# Message size limits (important for large CDC events)
message.max.bytes=1000000
replica.fetch.max.bytes=1000000

# JMX settings for monitoring
jmx.port=9999